<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h3 { 
      color: #1877f2;
      margin-top: 0;
    }
    .status { 
      padding: 12px;
      background: #e7f3ff;
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.6;
    }
    .platform-info {
      margin-top: 12px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      font-size: 12px;
    }
    .platform {
      margin-bottom: 8px;
    }
    .platform-name {
      font-weight: bold;
      color: #333;
    }
    .platform-pages {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }
    .stats {
      margin-top: 12px;
      padding: 10px;
      background: #f9f9f9;
      border-left: 3px solid #1877f2;
      border-radius: 3px;
      font-size: 12px;
    }
    .settings {
      margin-top: 15px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 5px;
      font-size: 12px;
    }
    .settings label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .settings input {
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    .settings button {
      background: #1877f2;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .settings button:hover {
      background: #166fe5;
    }
  </style>
</head>
<body>
  <h3>Company Post Liker</h3>
  
  <div class="status">
     Extension is active!<br><br>
    Checks for new posts every 120 minutes automatically.
  </div>

  <div class="settings">
    <h4>Customize Pages</h4>
    <label for="fb-pages">Facebook Page IDs (comma-separated):</label>
    <input type="text" id="fb-pages" placeholder="e.g., 61573834194646, zaavia.net">
    
    <label for="li-pages">LinkedIn Company Handles (comma-separated):</label>
    <input type="text" id="li-pages" placeholder="e.g., saerintechllc, zaavia">
    
    <button id="save-settings">Save Settings</button>
    <div id="save-message" style="margin-top: 10px; color: green; display: none;">Settings saved!</div>
  </div>

  <div class="platform-info">
    <div class="platform">
      <div class="platform-name">Facebook</div>
      <div class="platform-pages" id="fb-current">Pages: zaavia.net, 61573834194646</div>
    </div>
    <div class="platform">
      <div class="platform-name">LinkedIn</div>
      <div class="platform-pages" id="li-current">Companies: saerintechllc, zaavia</div>
    </div>
    <div class="platform">
      <div class="platform-name">Instagram</div>
      <div class="platform-pages">Accounts: zaavia, saerintech (fixed)</div>
    </div>
  </div>

  <div class="stats" id="stats">
    <!-- Last liked info will be inserted here -->
  </div>

  <script>
    // Load current settings and display
    chrome.storage.local.get(['fbPages', 'liPages'], (result) => {
      document.getElementById('fb-pages').value = result.fbPages || '61573834194646, zaavia.net';
      document.getElementById('li-pages').value = result.liPages || 'saerintechllc, zaavia';
      updateCurrentDisplay(result.fbPages, result.liPages);
    });

    // Load last liked
    chrome.storage.local.get(['lastLiked'], (result) => {
      const statsDiv = document.getElementById('stats');
      if (result.lastLiked) {
        const likedDate = new Date(result.lastLiked);
        statsDiv.innerHTML = 
          `⏱️ Last liked:<br>${likedDate.toLocaleString()}`;
      } else {
        statsDiv.innerHTML = '⏱️ No posts liked yet';
      }
    });

    // Save settings
    document.getElementById('save-settings').addEventListener('click', () => {
      const fbPages = document.getElementById('fb-pages').value.trim();
      const liPages = document.getElementById('li-pages').value.trim();
      
      chrome.storage.local.set({
        fbPages: fbPages,
        liPages: liPages
      }, () => {
        updateCurrentDisplay(fbPages, liPages);
        document.getElementById('save-message').style.display = 'block';
        setTimeout(() => {
          document.getElementById('save-message').style.display = 'none';
        }, 2000);
      });
    });

    function updateCurrentDisplay(fbPages, liPages) {
      document.getElementById('fb-current').textContent = `Pages: ${fbPages || '61573834194646, zaavia.net'}`;
      document.getElementById('li-current').textContent = `Companies: ${liPages || 'saerintechllc, zaavia'}`;
    }
  </script>
</body>
</html>
