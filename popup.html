<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    h3 { 
      color: #1877f2;
      margin-top: 0;
    }
    .status { 
      padding: 12px;
      background: #e7f3ff;
      border-radius: 5px;
      font-size: 13px;
      line-height: 1.6;
    }
    .platform-info {
      margin-top: 12px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      font-size: 12px;
    }
    .platform {
      margin-bottom: 8px;
    }
    .platform-name {
      font-weight: bold;
      color: #333;
    }
    .platform-pages {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }
    .stats {
      margin-top: 12px;
      padding: 10px;
      background: #f9f9f9;
      border-left: 3px solid #1877f2;
      border-radius: 3px;
      font-size: 12px;
    }
    .settings {
      margin-top: 15px;
      padding: 10px;
      background: #fff3cd;
      border-radius: 5px;
      font-size: 12px;
    }
    .settings label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .settings input {
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    .settings button {
      background: #1877f2;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 3px;
      cursor: pointer;
    }
    .settings button:hover {
      background: #166fe5;
    }
    .page-list {
      margin-bottom: 15px;
    }
    .page-item {
      display: flex;
      align-items: center;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      margin-bottom: 5px;
      border: 1px solid #e9ecef;
    }
    .page-item input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
    }
    .page-item button {
      background: #dc3545;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 20px;
      margin-left: 8px;
    }
    .page-item button:hover {
      background: #c82333;
    }
    .add-section {
      display: flex;
      margin-bottom: 15px;
    }
    .add-section input {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      margin-right: 8px;
    }
    .add-section button {
      padding: 6px 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .add-section button:hover {
      background: #218838;
    }
  </style>
</head>
<body>
  <h3>Company Post Liker</h3>
  
  <div class="status">
     Extension is active!<br><br>
    Checks for new posts every 60 minutes automatically.
  </div>

  <div class="settings">
    <h4>Manage Facebook Pages</h4>
    <div id="fb-list" class="page-list">
      <!-- FB pages will be listed here -->
    </div>
    <div class="add-section">
      <input type="text" id="fb-add" placeholder="Add Facebook page ID (e.g., 123456)">
      <button id="fb-add-btn">+ Add</button>
    </div>
    
    <h4>Manage LinkedIn Companies</h4>
    <div id="li-list" class="page-list">
      <!-- LI companies will be listed here -->
    </div>
    <div class="add-section">
      <input type="text" id="li-add" placeholder="Add LinkedIn company handle (e.g., microsoft)">
      <button id="li-add-btn">+ Add</button>
    </div>
    
    <button id="save-settings" style="margin-top: 15px; width: 100%;">Save All Changes</button>
    <div id="save-message" style="margin-top: 10px; color: green; display: none;">✅ Settings saved successfully!</div>
  </div>

  <div class="platform-info">
    <div class="platform">
      <div class="platform-name">Facebook</div>
      <div class="platform-pages" id="fb-current">Pages: zaavia.net, 61573834194646</div>
    </div>
    <div class="platform">
      <div class="platform-name">LinkedIn</div>
      <div class="platform-pages" id="li-current">Companies: saerintechllc, zaavia</div>
    </div>
  </div>

  <div class="stats" id="stats">
    <!-- Last liked info will be inserted here -->
  </div>

  <script src="popup.js"></script>
</body>
</html>
